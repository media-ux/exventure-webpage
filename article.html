<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Article — EX Venture</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="assets/icon-mark.png" />
  <link rel="stylesheet" href="design-system/colors_and_type.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>
  <div id="tweaks-root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="articles-data.js"></script>
  <script type="text/babel" src="nav-hero.jsx"></script>
  <script type="text/babel" src="founder-news.jsx"></script>
  <script type="text/babel" src="book-call-modal.jsx"></script>
  <script type="text/babel" src="article-view.jsx"></script>

  <script type="text/babel">
    function ArticleApp() {
      const [modalOpen, setModalOpen] = React.useState(false);
      const openModal = React.useCallback(() => setModalOpen(true), []);
      const closeModal = React.useCallback(() => setModalOpen(false), []);

      // Read article id from URL query (?id=...)
      const articleId = React.useMemo(() => {
        const params = new URLSearchParams(window.location.search);
        return params.get("id") || (window.ARTICLES && window.ARTICLES[0] && window.ARTICLES[0].id);
      }, []);

      const article = React.useMemo(() => {
        return (window.ARTICLES || []).find(a => a.id === articleId);
      }, [articleId]);

      // Update document title
      React.useEffect(() => {
        if (article) document.title = article.title + " — EX Venture";
      }, [article]);

      // Scroll to top on mount
      React.useEffect(() => { window.scrollTo(0, 0); }, [articleId]);

      return (
        <div>
          <GlobalNav onBookCall={openModal} />
          <ArticleView article={article} onBookCall={openModal} />
          <Footer onBookCall={openModal} />
          <BookCallModal open={modalOpen} onClose={closeModal} />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<ArticleApp />);
  </script>
</body>
</html>
