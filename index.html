<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>EX Venture — We Build Infrastructure</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="EX Venture builds infrastructure that matters. Four entities — EX AI, EX Venture, EX FI, EX Academy — spanning intelligence, venture capital, finance, and education across 4 continents." />
  <link rel="icon" type="image/png" href="assets/icon-mark.png" />
  <link rel="stylesheet" href="design-system/colors_and_type.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>
  <div id="tweaks-root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script src="articles-data.js"></script>
  <script type="text/babel" src="nav-hero.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="founder-news.jsx"></script>
  <script type="text/babel" src="book-call-modal.jsx"></script>

  <script type="text/babel">
    function App() {
      const [modalOpen, setModalOpen] = React.useState(false);
      const openModal = React.useCallback(() => setModalOpen(true), []);
      const closeModal = React.useCallback(() => setModalOpen(false), []);

      // Reveal-on-scroll effect
      React.useEffect(() => {
        const io = new IntersectionObserver((entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              e.target.classList.add('in');
              io.unobserve(e.target);
            }
          });
        }, { threshold: 0.08, rootMargin: '0px 0px -60px 0px' });
        document.querySelectorAll('.section, .quote-section, .founder-section, .cta').forEach(s => {
          s.classList.add('reveal');
          io.observe(s);
        });
        return () => io.disconnect();
      }, []);

      return (
        <div>
          <GlobalNav onBookCall={openModal} />
          <main>
            <Hero onBookCall={openModal} />
            <Proof />
            <AIFirst />
            <Family />
            <AcademyMedia />
            <Testimonials />
            <Quote />
            <Thesis />
            <Execute />
            <TrackRecord />
            <Research />
            <Founder />
            <News />
            {window.VerbSequence ? <window.VerbSequence /> : null}
            <CTA onBookCall={openModal} />
          </main>
          <Footer onBookCall={openModal} />
          <BookCallModal open={modalOpen} onClose={closeModal} />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script type="text/babel" src="tweaks.jsx"></script>
  <script src="mobile-nav.js"></script>
</body>
</html>
